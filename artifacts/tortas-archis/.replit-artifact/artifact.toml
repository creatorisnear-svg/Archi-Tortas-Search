kind = "web"
previewPath = "/"
title = "Tortas Archi's"
version = "1.0.0"
id = "artifacts/tortas-archis"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20562

[services.development]
run = "pnpm --filter @workspace/tortas-archis run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tortas-archis", "run", "build" ]
publicDir = "artifacts/tortas-archis/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20562"
BASE_PATH = "/"
